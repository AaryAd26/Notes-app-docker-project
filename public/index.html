<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }
    h1 {
      color: #333;
    }
    form {
      margin: 20px;
    }
    input {
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
    }
    .note {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      border-radius: 5px;
      box-shadow: 0 0 5px gray;
    }
  </style>
</head>
<body>

  <h1>📝 Notes App</h1>

  <form method="POST" action="/api/notes">
    <input type="text" name="text" placeholder="Enter note..." required />
    <button type="submit">Add</button>
  </form>

  <div id="notes"></div>

  <script>
    async function loadNotes() {
      const res = await fetch('/api/notes');
      const data = await res.json();

      const container = document.getElementById('notes');
      container.innerHTML = "";

      data.forEach(note => {
        const div = document.createElement('div');
        div.className = "note";
        div.innerText = note.text;
        container.appendChild(div);
      });
    }

    loadNotes();
  </script>

</body>
</html>
